server:
  port: 8888
spring:
  application:
    name: config-server
  profiles:
    # Git을 저장소로 사용한다고 프로파일을 지정한다.
    active:
      - git
  cloud:
    config:
      server:
        # Git 저장소에 대한 설정을 작성한다.
        git:
          # Git 저장소 URL을 작성한다.
          uri: git@github.com:wnstkd704/spring-cloud-config.git
          # 설정 파일을 찾을 경로를 작성한다.
          search-paths:
            - config
          # 로컬 시스템의 SSH 설정을 무시하고, 스프링 클라우드 컨피그에서 제공하는 SSH 설정을 우선 적용한다
          ignore-local-ssh-settings: true
          # SSH 호스트의 공개키를 작성한다
          host-key: AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBEmKSENjQEezOmxkZMy7opKgwFB9nkt5YRrYMjNuG5N87uRgg6CLrbo5wAdT/y6v0mKV0U2w0WZ2YB/++Tpockg=
          # 공개키를 생성할 때 사용할 알고리즘을 작성한다.
          host-key-algorithm: ecdsa-sha2-nistp256
          # 생성한 비공계키를 입력한다.
          private-key: |
            -----BEGIN OPENSSH PRIVATE KEY-----
            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
            QyNTUxOQAAACBdLjuoY3d8lUJIUP5w3I4r1/CVAaDLU+8e54K+bd114wAAAJhyIQhSciEI
            UgAAAAtzc2gtZWQyNTUxOQAAACBdLjuoY3d8lUJIUP5w3I4r1/CVAaDLU+8e54K+bd114w
            AAAEDw/tRRebwWeKVOwadtJpgXZPZrBiW5CBGe0RWGPcNKH10uO6hjd3yVQkhQ/nDcjivX
